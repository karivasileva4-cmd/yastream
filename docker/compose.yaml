services:
  # Puppeteer
  browserless:
    image: browserless/chrome:latest
    ports:
      - "3000:3000"
    restart: always
    environment:
      - MAX_CONCURRENT_SESSIONS=5 # Limits how many browsers can run at once
      - MAX_QUEUE_CAPACITY=10 # Queue up requests if over capacity
      - PREBOOT_CHROME=true # Keeps one browser "warm" for speed

  # Flaresolverr
  lb:
    image: nginx:alpine
    ports:
      - "8191:8191"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - flaresolverr
    restart: unless-stopped

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_FILE=${LOG_FILE:-none}
      - LOG_HTML=${LOG_HTML:-false}
      - CAPTCHA_SOLVER=${CAPTCHA_SOLVER:-none}
      - TZ=Europe/Berlin
    restart: unless-stopped
    deploy:
      mode: replicated
      replicas: 4 # Number of concurrent browser pipelines
